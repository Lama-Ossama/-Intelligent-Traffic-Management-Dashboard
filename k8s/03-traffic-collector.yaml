apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-collector
  namespace: traffic-system
  labels:
    app: traffic-collector
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: traffic-collector
  template:
    metadata:
      labels:
        app: traffic-collector
        version: v1
    spec:
      # Restart policy: always restart if pod crashes
      restartPolicy: Always
      
      containers:
      - name: traffic-collector
        image: mohamedosama2004/traffic-collector:latest
        imagePullPolicy: Always
        
        # Environment variables
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: traffic-config
              key: NODE_ENV
        - name: PYTHONUNBUFFERED
          value: "1"
        
        # Resource requests and limits
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        
        # Logging
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        
        # Liveness probe: check if pod is alive
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - ps aux | grep app.py || exit 1
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe: check if pod is ready to receive traffic
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - ps aux | grep app.py || exit 1
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
      
      # Volumes
      volumes:
      - name: logs
        emptyDir: {}
      
      # Pod restart policy
      terminationGracePeriodSeconds: 30
      
      # Affinity rules (optional - for pod distribution)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - traffic-collector
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: traffic-collector
  namespace: traffic-system
  labels:
    app: traffic-collector
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: traffic-collector
