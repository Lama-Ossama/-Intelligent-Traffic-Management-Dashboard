# The docker-hub-secret Deployments reference via imagePullSecrets is
# intentionally NOT defined here — a Secret manifest checked into git means
# the credential ships with the repo forever, even after rotation. Create it
# out-of-band once per cluster before `kubectl apply -k k8s/`:
#
#   DOCKERHUB_USERNAME=... DOCKERHUB_TOKEN=... ../scripts/k8s-create-secret.sh
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: traffic-config
  namespace: traffic-system
data:
  NODE_ENV: "production"
  DASHBOARD_HOST: "traffic-dashboard"
  DASHBOARD_PORT: "3002"

---
