name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ── Job 1: Test & Build ──────────────────────────────────
  test-and-build:
    runs-on: ubuntu-latest
    env:
      # Isolated Compose project per run — mirrors the Jenkinsfile's
      # approach so this job never builds/starts the jenkins service
      # (also defined in docker-compose.yml) and can't collide with
      # a Jenkins run or a local dev stack on a shared/self-hosted runner.
      COMPOSE_PROJECT_NAME: gha-${{ github.run_id }}
      COMPOSE_FILES: -f docker-compose.yml -f docker-compose.ci.yml
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run integration tests
        # scripts/ci-test.sh is the single source of truth for the
        # integration checks — the Jenkinsfile calls the same script
        # so both pipelines run identical checks.
        run: bash scripts/ci-test.sh
        working-directory: ${{ github.workspace }}

  # ── Job 2: Build & Push to Docker Hub ────────────────────
  build-push-docker:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Traffic Collector image
        uses: docker/build-push-action@v4
        with:
          context: ./traffic-collector
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/traffic-collector:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/traffic-collector:${{ github.sha }}

      - name: Build and push Traffic Dashboard image
        uses: docker/build-push-action@v4
        with:
          context: ./traffic-dashboard
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/traffic-dashboard:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/traffic-dashboard:${{ github.sha }}

  # ── Job 3: Deploy to EC2 ──────────────────────────────────
  deploy-ec2:
    runs-on: ubuntu-latest
    needs: build-push-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Traffic Dashboard EC2 instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR=~/app
            REPO_URL=https://github.com/Lama-Ossama/-Intelligent-Traffic-Management-Dashboard.git

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            # .env isn't tracked by git (see .gitignore), so `git reset
            # --hard` above never touches it -- safe to rewrite every
            # deploy to keep the admin password in sync with the secret.
            cat > .env <<ENV_EOF
            GRAFANA_ADMIN_USER=admin
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            ENV_EOF

            docker compose up --build -d traffic-collector traffic-dashboard prometheus grafana
            bash scripts/health-check.sh

            # Grafana installs plugins on first boot and can take ~30-60s to
            # become ready, so retry its health endpoint instead of checking
            # once immediately (which raced ahead of startup and failed CI).
            echo "Waiting for Grafana to become healthy..."
            for i in $(seq 1 24); do
              if curl -fsS http://localhost:3000/api/health > /dev/null; then
                echo "OK  grafana health check"
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "ERROR: Grafana did not become healthy in time"
                docker compose logs grafana --tail 30
                exit 1
              fi
              echo "  grafana not ready yet ($i/24), retrying in 5s..."
              sleep 5
            done

  # ── Job 4: Code Quality Check ────────────────────────────
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Check Python syntax
        run: |
          python -m py_compile traffic-collector/app.py

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./traffic-dashboard

      - name: Check Node.js code
        run: node -c server.js
        working-directory: ./traffic-dashboard
