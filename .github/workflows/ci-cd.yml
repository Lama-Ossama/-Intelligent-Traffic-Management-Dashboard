name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ── Job 1: Test & Build ──────────────────────────────────
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker images
        run: |
          docker compose build
        working-directory: ${{ github.workspace }}

      - name: Run containers for testing
        run: |
          docker compose up -d
          sleep 10
        working-directory: ${{ github.workspace }}

      - name: Test Traffic Dashboard API
        run: |
          echo "Testing Dashboard health check..."
          curl -f http://localhost:3002/ || exit 1
          echo "✓ Dashboard is responding"
          
          curl -f http://localhost:3002/api/traffic || exit 1
          echo "✓ API endpoint is working"

      - name: Stop containers
        run: docker compose down
        working-directory: ${{ github.workspace }}

  # ── Job 2: Build & Push to Docker Hub ────────────────────
  build-push-docker:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Traffic Collector image
        uses: docker/build-push-action@v4
        with:
          context: ./traffic-collector
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/traffic-collector:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/traffic-collector:${{ github.sha }}

      - name: Build and push Traffic Dashboard image
        uses: docker/build-push-action@v4
        with:
          context: ./traffic-dashboard
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/traffic-dashboard:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/traffic-dashboard:${{ github.sha }}

  # ── Job 3: Code Quality Check ────────────────────────────
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Check Python syntax
        run: |
          python -m py_compile traffic-collector/app.py

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./traffic-dashboard

      - name: Check Node.js code
        run: node -c server.js
        working-directory: ./traffic-dashboard

