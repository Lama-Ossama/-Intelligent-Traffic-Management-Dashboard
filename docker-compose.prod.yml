version: '3.8'

services:
  # ── Traffic Data Collector (Python) ──────────────────────
  traffic-collector:
    image: ${DOCKER_REGISTRY}/traffic-collector:${IMAGE_TAG:-latest}
    container_name: traffic-collector-prod
    networks:
      - traffic-network
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - traffic-dashboard
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Traffic Dashboard (Node.js + Express) ───────────────
  traffic-dashboard:
    image: ${DOCKER_REGISTRY}/traffic-dashboard:${IMAGE_TAG:-latest}
    container_name: traffic-dashboard-prod
    ports:
      - "3002:3002"
    networks:
      - traffic-network
    environment:
      - NODE_ENV=production
      - PORT=3002
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  traffic-network:
    driver: bridge
