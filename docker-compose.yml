services:
  # ── Traffic Data Collector (Python) ──────────────────────
  traffic-collector:
    build:
      context: ./traffic-collector
      dockerfile: dockerfile
    container_name: traffic-collector
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./traffic-collector/Traffic.csv:/app/Traffic.csv
    networks:
      - traffic-network
    restart: unless-stopped

  # ── Traffic Dashboard (Node.js + Express) ───────────────
  traffic-dashboard:
    build:
      context: ./traffic-dashboard
      dockerfile: Dockerfile
    container_name: traffic-dashboard
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
    volumes:
      - ./traffic-dashboard/data:/app/data
    networks:
      - traffic-network
    depends_on:
      - traffic-collector
    restart: unless-stopped

  # Prometheus Monitoring
  # Scrapes /metrics from the dashboard service and exposes the Prometheus UI.
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: traffic-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - traffic-network
    depends_on:
      - traffic-dashboard
    restart: unless-stopped
#grafana
  grafana:
    image: grafana/grafana-oss:latest
    container_name: traffic-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - traffic-network
    depends_on:
      - prometheus
    restart: unless-stopped    

networks:
  traffic-network:
    driver: bridge

volumes:
  grafana-storage:
    
