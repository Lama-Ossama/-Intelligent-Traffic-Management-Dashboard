services:
  # ── Traffic Data Collector (Python) ──────────────────────
  traffic-collector:
    build:
      context: ./traffic-collector
      dockerfile: dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      # Points at the same file the dashboard reads (bind-mounted below) so
      # both containers read one canonical CSV instead of two copies that
      # could silently drift apart.
      - TRAFFIC_CSV_PATH=/data/Traffic.csv
    volumes:
      - ./data/Traffic.csv:/data/Traffic.csv:ro
    networks:
      - traffic-network
    restart: unless-stopped

  # ── Traffic Dashboard (Node.js + Express) ───────────────
  traffic-dashboard:
    build:
      context: ./traffic-dashboard
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - TRAFFIC_CSV_PATH=/data/Traffic.csv
    volumes:
      - ./data/Traffic.csv:/data/Traffic.csv:ro
    networks:
      - traffic-network
    depends_on:
      - traffic-collector
    restart: unless-stopped

  # Prometheus Monitoring
  # Scrapes /metrics from the dashboard service and exposes the Prometheus UI.
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: traffic-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - traffic-network
    depends_on:
      - traffic-dashboard
    restart: unless-stopped

  # ── Jenkins (self-hosted CI/CD, alongside GitHub Actions) ──
  # Custom image bundles Docker CLI + Node.js + Python so the
  # Jenkinsfile stages can install deps, test, and build/push
  # images. The Docker socket is mounted so Jenkins controls the
  # HOST's Docker daemon (Docker-outside-of-Docker) instead of
  # running a nested daemon.
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: traffic-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - traffic-network
    restart: unless-stopped

networks:
  traffic-network:
    driver: bridge

volumes:
  jenkins_home:
